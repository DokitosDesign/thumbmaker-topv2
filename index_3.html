<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Thumbnail Radio TOP FM 87.9 FM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0e1116;
    --panel: #171b22;
    --panel-2: #1e232c;
    --line: #2a2f3a;
    --text: #eef1f5;
    --text-dim: #9aa4b2;
    --accent: #e4002b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
  }
  .app{
    max-width:460px;
    margin:0 auto;
    padding:20px 16px 120px;
    display:flex;
    flex-direction:column;
    gap:18px;
  }
  .brand{
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .brand .dot{color:var(--accent);}
  h1{
    font-size:17px;
    margin:0;
    letter-spacing:-0.01em;
  }
  .sub{
    font-size:12.5px;
    color:var(--text-dim);
    margin:2px 0 0;
  }

  /* preview */
  .stage{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
  }
  .canvas-shell{
    width:100%;
    max-width:300px;
    box-shadow:0 16px 44px rgba(0,0,0,.5);
    border-radius:10px;
    overflow:hidden;
    line-height:0;
    touch-action:pan-y;
    position:relative;
    cursor:grab;
  }
  .canvas-shell.dragging{
    touch-action:none;
  }
  .canvas-shell:active{cursor:grabbing;}
  #canvas{
    display:block;
    width:100%;
    height:auto;
  }
  .drag-hint{
    text-align:center;
    font-size:10.5px;
    color:var(--text-dim);
    letter-spacing:.02em;
  }
  .size-toggle{
    display:flex;
    gap:8px;
    width:100%;
    max-width:300px;
  }
  .size-toggle .chip{ flex:1; text-align:center; }

  /* generic section */
  .section{ display:flex; flex-direction:column; gap:10px; }
  .label-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  label.title{
    font-size:11.5px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--text-dim);
  }
  .link-btn{
    background:none;
    border:none;
    color:var(--text-dim);
    font-size:12px;
    font-weight:600;
    cursor:pointer;
    padding:2px 4px;
  }
  .link-btn:hover{ color:var(--text); }

  /* big upload button */
  .upload-btn-big{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    width:100%;
    padding:26px 12px;
    background:var(--panel-2);
    border:2px dashed var(--line);
    color:var(--text);
    border-radius:14px;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .upload-btn-big:hover{ border-color:var(--accent); background:#232936; }
  .upload-btn-big .icon{ font-size:30px; line-height:1; }
  .upload-btn-big .txt{ font-size:14px; font-weight:700; }
  .file-name{
    font-size:11.5px;
    color:var(--text-dim);
    text-align:center;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  /* headline */
  .headline-wrap{ position:relative; }
  textarea#headline{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:15px;
    font-weight:600;
    padding:12px 70px 12px 14px;
    border-radius:10px;
    resize:none;
    line-height:1.4;
  }
  textarea#headline:focus{ outline:none; border-color:var(--accent); }
  .paste-btn{
    position:absolute;
    top:8px;
    right:8px;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text-dim);
    font-size:11px;
    font-weight:700;
    padding:6px 9px;
    border-radius:7px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:4px;
  }
  .paste-btn:hover{ color:var(--text); border-color:var(--accent); }
  .headline-hint{ font-size:11px; color:var(--text-dim); }

  /* chips */
  .chip-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .chip{
    padding:9px 14px;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:999px;
    cursor:pointer;
    font-size:13px;
    font-weight:600;
    color:var(--text);
    display:flex;
    align-items:center;
    gap:6px;
    user-select:none;
    transition:border-color .15s, background .15s, transform .1s;
  }
  .chip:hover{ transform:translateY(-1px); }
  .chip.active{
    border-color:#fff;
    box-shadow:0 0 0 1px #fff inset;
  }
  .chip .dot{
    width:9px; height:9px; border-radius:50%; flex:none;
  }
  .chip.pressing{ opacity:.55; }

  .add-category{ display:flex; gap:6px; }
  .add-category input[type=text]{
    flex:1;
    font-size:12.5px;
    padding:9px 10px;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:8px;
  }
  .add-category input[type=color]{
    flex:none;
    width:38px;
    height:38px;
    padding:2px;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--panel-2);
    cursor:pointer;
  }
  .add-category button{
    flex:none;
    padding:0 14px;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    font-size:12.5px;
    font-weight:600;
    border-radius:8px;
    cursor:pointer;
  }
  .add-category button:hover{ border-color:var(--accent); }

  /* advanced accordion */
  .advanced-toggle{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    padding:13px 14px;
    border-radius:10px;
    cursor:pointer;
    font-size:13px;
    font-weight:700;
  }
  .advanced-toggle .caret{ transition:transform .2s; color:var(--text-dim); }
  .advanced-toggle.open .caret{ transform:rotate(180deg); }
  .advanced-body{
    display:none;
    flex-direction:column;
    gap:18px;
    padding:16px 4px 4px;
  }
  .advanced-body.open{ display:flex; }

  input[type=text].field-input{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:14px;
    padding:10px 12px;
    border-radius:8px;
  }
  input[type=text].field-input:focus{ outline:none; border-color:var(--accent); }

  .pos-list{ display:flex; flex-wrap:wrap; gap:8px; }
  .pos-btn{
    flex:1; min-width:64px;
    padding:9px 8px;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:8px;
    cursor:pointer;
    font-size:12px;
    font-weight:600;
    color:var(--text);
    text-align:center;
  }
  .pos-btn:hover{ transform:translateY(-1px); }
  .pos-btn.active{ border-color:var(--accent); background:rgba(228,0,43,0.12); color:#fff; }

  .reset-pos-btn{
    padding:9px 12px;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:8px;
    cursor:pointer;
    font-size:12px;
    font-weight:600;
    color:var(--text-dim);
    align-self:flex-start;
  }
  .reset-pos-btn:hover{ color:var(--text); border-color:var(--accent); }

  /* history */
  .history-row{ display:flex; flex-direction:column; gap:6px; }
  .history-item{
    display:flex;
    align-items:center;
    gap:8px;
    padding:9px 11px;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:8px;
    cursor:pointer;
    font-size:12.5px;
    color:var(--text-dim);
    overflow:hidden;
  }
  .history-item:hover{ color:var(--text); border-color:var(--accent); }
  .history-item span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .history-empty{ font-size:12px; color:var(--text-dim); opacity:.7; }

  /* download */
  .download-bar{
    position:fixed;
    left:0; right:0; bottom:0;
    display:flex;
    justify-content:center;
    padding:14px 16px calc(14px + env(safe-area-inset-bottom, 0px));
    background:linear-gradient(to top, var(--bg) 60%, rgba(14,17,22,0));
    z-index:20;
  }
  .download-bar-inner{
    display:flex;
    gap:10px;
    width:100%;
    max-width:428px;
  }
  .preview-btn{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    padding:15px 10px;
    background:var(--panel-2);
    color:var(--text);
    border:1px solid var(--line);
    border-radius:12px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .preview-btn:hover{ border-color:var(--accent); background:#232936; }
  .download-btn{
    flex:1.7;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:15px;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:12px;
    font-size:15px;
    font-weight:700;
    letter-spacing:.01em;
    cursor:pointer;
    box-shadow:0 8px 24px rgba(228,0,43,.35);
    transition:filter .15s;
  }
  .download-btn:hover{ filter:brightness(1.08); }
  .download-btn:active{ filter:brightness(0.95); }

  /* preview modal */
  .preview-modal{
    position:fixed;
    inset:0;
    background:rgba(6,8,12,0.97);
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
    padding:20px 16px calc(20px + env(safe-area-inset-bottom, 0px));
    z-index:50;
  }
  .preview-modal.open{ display:flex; }
  .preview-modal-inner{
    flex:1;
    min-height:0;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .preview-modal-inner img{
    max-width:100%;
    max-height:100%;
    border-radius:10px;
    box-shadow:0 20px 60px rgba(0,0,0,.6);
  }
  .preview-modal-actions{
    display:flex;
    gap:10px;
    width:100%;
    max-width:428px;
    flex:none;
  }
  .modal-btn{
    flex:1;
    padding:15px;
    border-radius:12px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    transition:filter .15s, border-color .15s;
  }
  .modal-btn.back{
    background:var(--panel-2);
    color:var(--text);
    border:1px solid var(--line);
  }
  .modal-btn.back:hover{ border-color:var(--accent); }
  .modal-btn.download{
    background:var(--accent);
    color:#fff;
    border:none;
    box-shadow:0 8px 24px rgba(228,0,43,.35);
  }
  .modal-btn.download:hover{ filter:brightness(1.08); }

  .toast{
    position:fixed;
    left:50%;
    bottom:96px;
    transform:translateX(-50%);
    background:#232936;
    border:1px solid var(--line);
    color:var(--text);
    font-size:12.5px;
    padding:10px 16px;
    border-radius:20px;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
    opacity:0;
    pointer-events:none;
    transition:opacity .2s;
    z-index:60;
    max-width:90vw;
    text-align:center;
  }
  .toast.show{ opacity:1; }

  @media (min-width:520px){
    .app{ padding-top:36px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="brand-block">
    <div class="brand"><h1>Thumbnail<span class="dot">.</span>TOP FM</h1></div>
    <p class="sub" id="sub-label">Crie a capa da notícia · 1080 × 1350px</p>
  </div>

  <div class="stage">
    <div class="canvas-shell" id="canvas-shell">
      <canvas id="canvas" width="1080" height="1350"></canvas>
    </div>
    <div class="drag-hint">toque e segure para arrastar · pinça/scroll para zoom</div>
    <div class="size-toggle" id="size-toggle"></div>
  </div>

  <div class="section">
    <label class="upload-btn-big">
      <span class="icon">🖼️</span>
      <span class="txt" id="bg-label">Adicionar Foto</span>
      <input type="file" id="bg-input" accept="image/*" style="display:none;">
    </label>
    <div class="file-name" id="bg-filename"></div>
  </div>

  <div class="section">
    <div class="label-row"><label class="title">Escurecer fundo</label></div>
    <input type="range" id="overlay-range" min="0" max="90" value="45" style="width:100%;">
  </div>

  <div class="section">
    <div class="label-row"><label class="title">Título</label></div>
    <div class="headline-wrap">
      <textarea id="headline" rows="3" placeholder="Digite o título...">O seu título de notícia aparece aqui</textarea>
      <button type="button" class="paste-btn" id="paste-btn">📋 Colar</button>
    </div>
    <div class="headline-hint">Ajusta o tamanho automaticamente para caber em até 4 linhas.</div>
  </div>

  <div class="section">
    <div class="label-row"><label class="title">Categoria / Template</label></div>
    <div class="chip-row" id="category-list"></div>
    <div class="add-category">
      <input type="text" id="new-cat-label" placeholder="Nova categoria" maxlength="20">
      <input type="color" id="new-cat-color" value="#e4002b">
      <button type="button" id="add-cat-btn">Adicionar</button>
    </div>
  </div>

  <button type="button" class="advanced-toggle" id="advanced-toggle">
    <span>Opções avançadas</span>
    <span class="caret">▼</span>
  </button>
  <div class="advanced-body" id="advanced-body">

    <div class="section">
      <div class="label-row"><label class="title">Legenda</label></div>
      <input type="text" class="field-input" id="subtitle" value="Notícia completa na descrição">
    </div>

    <div class="section">
      <div class="label-row"><label class="title">Alinhamento da logo</label></div>
      <div class="pos-list" id="logo-align-list"></div>
    </div>

    <div class="section">
      <div class="label-row"><label class="title">Posição / zoom da foto</label></div>
      <button type="button" class="reset-pos-btn" id="reset-pos-btn">↺ Repor posição e zoom</button>
    </div>

    <div class="section">
      <div class="label-row"><label class="title">Outro tamanho</label></div>
      <div class="pos-list" id="size-list-extra"></div>
    </div>
  </div>

  <div class="section">
    <div class="label-row"><label class="title">Últimas notícias</label></div>
    <div class="history-row" id="history-list">
      <div class="history-empty">Suas últimas notícias aparecem aqui.</div>
    </div>
  </div>
</div>

<div class="download-bar">
  <div class="download-bar-inner">
    <button type="button" class="preview-btn" id="preview-btn">👁 Visualizar</button>
    <button class="download-btn" id="download-btn">⬇ Baixar PNG</button>
  </div>
</div>

<div class="preview-modal" id="preview-modal">
  <div class="preview-modal-inner">
    <img id="preview-modal-img" alt="Pré-visualização da imagem">
  </div>
  <div class="preview-modal-actions">
    <button type="button" class="modal-btn back" id="preview-back-btn">← Voltar a editar</button>
    <button type="button" class="modal-btn download" id="preview-download-btn">⬇ Baixar PNG</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let W = 1080, H = 1350;
const SIZE_PRESETS = [
  { key:'feed',      label: 'Feed (4:5)',       short:'Feed',       w: 1080, h: 1350 },
  { key:'novo',      label: 'Feed novo (3:4)',  short:'Feed novo',  w: 1080, h: 1440 },
  { key:'square',    label: 'Quadrado (1:1)',   short:'Quadrado',   w: 1080, h: 1080 },
  { key:'landscape', label: 'Paisagem (16:9) · computador', short:'Paisagem', w: 1920, h: 1080 },
  { key:'stories',   label: 'Vertical (9:16) · stories/reels', short:'Stories', w: 1080, h: 1920 }
];
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const toastEl = document.getElementById('toast');

function showToast(msg, ms) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toastEl.classList.remove('show'), ms || 2600);
}

const CATEGORIES = [
  { emoji: '🔴', label: 'Urgente',        color: '#E4002B', textColor: '#ffffff', big: true },
  { emoji: '📻', label: 'Ao Vivo',        color: '#E4002B', textColor: '#ffffff', big: true },
  { emoji: '🔵', label: 'Política',       color: '#0057FF', textColor: '#ffffff' },
  { emoji: '🟢', label: 'Economia',       color: '#00B050', textColor: '#ffffff' },
  { emoji: '🟠', label: 'Cidades',        color: '#FF6A00', textColor: '#ffffff' },
  { emoji: '🟣', label: 'Mundo',          color: '#8A2BE2', textColor: '#ffffff' },
  { emoji: '🟢', label: 'Esportes',       color: '#AACC00', textColor: '#1A1A1A' },
  { emoji: '❤️', label: 'Saúde',          color: '#C8102E', textColor: '#ffffff' },
  { emoji: '🔷', label: 'Tecnologia',     color: '#00B8D9', textColor: '#ffffff' },
  { emoji: '🟡', label: 'Entretenimento', color: '#FFC400', textColor: '#1A1A1A' },
  { emoji: '🟡', label: 'Humor',          color: '#FFDE59', textColor: '#1A1A1A' },
  { emoji: '🟤', label: 'Cultura',        color: '#8B5E3C', textColor: '#ffffff' },
  { emoji: '🌿', label: 'Meio Ambiente',  color: '#1B5E20', textColor: '#ffffff' },
  { emoji: '🎤', label: 'Entrevista',     color: '#6D4AFF', textColor: '#ffffff' },
  { emoji: '⛅', label: 'Tempo',          color: '#2CA9E1', textColor: '#ffffff' },
  { emoji: '🗳️', label: 'Eleições 2026',  color: '#1F4E8C', textColor: '#ffffff' },
  { emoji: '⚖️', label: 'Justiça',        color: '#4B2E83', textColor: '#ffffff' },
  { emoji: '🎵', label: 'Música',         color: '#D6006C', textColor: '#ffffff' },
  { emoji: '📢', label: 'Utilidade Pública', color: '#0097A7', textColor: '#ffffff' }
];

let selectedCategory = CATEGORIES[0];
let lineColor = selectedCategory.color;
let overlayStrength = 0.45;
let logoAlign = 'center';
let bgPosition = { x: 0.5, y: 0.5 };

const sizeExtraWrap = document.getElementById('size-list-extra');

function setSize(preset, skipSave) {
  currentSizeKey = preset.key;
  W = preset.w;
  H = preset.h;
  canvas.width = W;
  canvas.height = H;
  if (subLabel) subLabel.textContent = `Crie a capa da notícia · ${W} × ${H}px`;
  [...sizeToggleWrap.children, ...sizeExtraWrap.children].forEach(b => {
    b.classList.toggle('active', b.dataset.key === preset.key);
  });
  if (!skipSave) saveSettings();
  draw();
}

/* ---------- categories / templates as chips ---------- */
const categoryWrap = document.getElementById('category-list');

function getContrastText(hex) {
  const c = hex.replace('#', '');
  const num = parseInt(c, 16);
  const r = (num >> 16) & 255, g = (num >> 8) & 255, b = num & 255;
  const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  return luminance > 0.62 ? '#1A1A1A' : '#ffffff';
}

function saveCustomCategories() {
  try {
    const custom = CATEGORIES.filter(c => c.custom);
    localStorage.setItem(CUSTOM_CATEGORY_STORAGE_KEY, JSON.stringify(custom));
  } catch (e) {}
}

function loadCustomCategories() {
  try {
    const raw = localStorage.getItem(CUSTOM_CATEGORY_STORAGE_KEY);
    if (!raw) return;
    const custom = JSON.parse(raw);
    custom.forEach(cat => {
      CATEGORIES.push(cat);
      addCategoryChip(cat, false);
    });
  } catch (e) {}
}

function selectCategory(cat, btn) {
  selectedCategory = cat;
  lineColor = cat.color;
  [...categoryWrap.children].forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  saveSettings();
  draw();
}

function addCategoryChip(cat, select) {
  const btn = document.createElement('div');
  btn.className = 'chip';
  btn.innerHTML = `<span class="dot" style="background:${cat.color}"></span><span>${cat.label}</span>`;

  let pressTimer = null;
  let longPressed = false;

  const startPress = () => {
    if (!cat.custom) return;
    longPressed = false;
    btn.classList.add('pressing');
    pressTimer = setTimeout(() => {
      longPressed = true;
      btn.classList.remove('pressing');
      const idx = CATEGORIES.indexOf(cat);
      if (idx !== -1) CATEGORIES.splice(idx, 1);
      btn.remove();
      saveCustomCategories();
      if (selectedCategory === cat) {
        selectedCategory = CATEGORIES[0];
        lineColor = selectedCategory.color;
        [...categoryWrap.children].forEach(b => b.classList.remove('active'));
        categoryWrap.children[0] && categoryWrap.children[0].classList.add('active');
        saveSettings();
        draw();
      }
      showToast('Categoria removida');
    }, 600);
  };
  const cancelPress = () => {
    clearTimeout(pressTimer);
    btn.classList.remove('pressing');
  };

  btn.addEventListener('pointerdown', startPress);
  btn.addEventListener('pointerup', cancelPress);
  btn.addEventListener('pointerleave', cancelPress);
  btn.addEventListener('pointercancel', cancelPress);

  btn.addEventListener('click', () => {
    if (longPressed) { longPressed = false; return; }
    selectCategory(cat, btn);
  });

  categoryWrap.appendChild(btn);
  if (select) selectCategory(cat, btn);
  return btn;
}

CATEGORIES.forEach((cat, i) => {
  const btn = addCategoryChip(cat, false);
  if (i === 0) btn.classList.add('active');
});
loadCustomCategories();

document.getElementById('add-cat-btn').addEventListener('click', () => {
  const labelInput = document.getElementById('new-cat-label');
  const colorInput = document.getElementById('new-cat-color');
  const label = labelInput.value.trim();
  if (!label) return;
  const color = colorInput.value;
  const newCat = { emoji: '', label, color, textColor: getContrastText(color), custom: true };
  CATEGORIES.push(newCat);
  addCategoryChip(newCat, true);
  saveCustomCategories();
  labelInput.value = '';
});
document.getElementById('new-cat-label').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    document.getElementById('add-cat-btn').click();
  }
});

      draw();
      showToast('Título colado');
    }
  } catch (e) {
    showToast('Não foi possível colar automaticamente. Cole manualmente no campo.');
  }
});

/* ---------- history ---------- */
const historyList = document.getElementById('history-list');

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}
function saveHistory(list) {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(list.slice(0, 5))); } catch (e) {}
}
function renderHistory() {
  const list = loadHistory();
  historyList.innerHTML = '';
  if (!list.length) {
    historyList.innerHTML = '<div class="history-empty">Suas últimas notícias aparecem aqui.</div>';
    return;
  }
  list.forEach(text => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `<span>${text}</span>`;
    item.addEventListener('click', () => {
      headlineEl.value = text;
      state.headline = text;
      draw();
    });
    historyList.appendChild(item);
  });
}
function pushHistory(text) {
  text = (text || '').trim();
  if (!text) return;
  let list = loadHistory().filter(t => t !== text);
  list.unshift(text);
  saveHistory(list);
  renderHistory();
}
renderHistory();

/* ---------- headline auto-fit (max 3 lines) ---------- */
function wrapLines(text, font, maxWidth) {
  ctx.font = font;
  const words = text.toUpperCase().split(/\s+/).filter(Boolean);
  const lines = [];
  let current = '';
  words.forEach(word => {
    const test = current ? current + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && current) {
      lines.push(current);
      current = word;
    } else {
      current = test;
    }
  });
  if (current) lines.push(current);
  return lines;
}

function fitHeadline(text, maxWidth, startSize, minSize, isBig) {
  let size = isBig ? Math.round(startSize * 1.08) : startSize;
  let lines, lineHeight;
  while (size >= minSize) {
    const font = `800 ${size}px Inter, sans-serif`;
    lines = wrapLines(text, font, maxWidth);
    lineHeight = Math.round(size * 1.19);
    if (lines.length <= 4) return { font, lines, lineHeight, size };
    size -= 2;
  }
  const font = `800 ${minSize}px Inter, sans-serif`;
  lines = wrapLines(text, font, maxWidth);
  lineHeight = Math.round(minSize * 1.19);
  return { font, lines, lineHeight, size: minSize };
}

/* ---------- background image drag + zoom ---------- */
function drawImageCover(img, x, y, w, h, alignX, alignY, zoom) {
  if (alignX === undefined) alignX = 0.5;
  if (alignY === undefined) alignY = 0.5;
  if (!zoom || zoom < 1) zoom = 1;
  const imgRatio = img.width / img.height;
  const boxRatio = w / h;
  let sx, sy, sw, sh;
  if (imgRatio > boxRatio) {
    sh = img.height;
    sw = sh * boxRatio;
  } else {
    sw = img.width;
    sh = sw / boxRatio;
  }
  sw = sw / zoom;
  sh = sh / zoom;
  sx = (img.width - sw) * alignX;
  sy = (img.height - sh) * alignY;
  sx = Math.max(0, Math.min(img.width - sw, sx));
  sy = Math.max(0, Math.min(img.height - sh, sy));
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

const canvasShell = document.getElementById('canvas-shell');
let dragState = null;
let pinchState = null;
let armTimer = null;
const HOLD_MS = 160;
const MOVE_CANCEL_PX = 10;

function clamp01(v) { return Math.max(0, Math.min(1, v)); }

function beginDrag(e) {
  dragState = { id: e.pointerId, startX: e.clientX, startY: e.clientY, startPos: { ...bgPosition } };
  canvasShell.classList.add('dragging');
  try { canvasShell.setPointerCapture(e.pointerId); } catch (err) {}
}

let pendingTouch = null;

canvasShell.addEventListener('pointerdown', e => {
  if (!bgImage) return;
  clearTimeout(armTimer);
  pendingTouch = null;

  if (e.pointerType === 'mouse') {
    // desktop: no scroll conflict, drag starts immediately
    beginDrag(e);
    return;
  }

  // touch: wait a short moment before arming the drag, so a normal
  // scroll swipe (which moves right away) passes through to the page
  pendingTouch = { id: e.pointerId, x: e.clientX, y: e.clientY };
  armTimer = setTimeout(() => {
    if (!pendingTouch || activeTouches.size >= 2) return; // moved already or a pinch took over
    beginDrag({ pointerId: pendingTouch.id, clientX: pendingTouch.x, clientY: pendingTouch.y });
    pendingTouch = null;
  }, HOLD_MS);
});

canvasShell.addEventListener('pointermove', e => {
  if (!bgImage) return;

  // cancel the pending hold-to-drag if the finger moved like a scroll before it armed
  if (pendingTouch && pendingTouch.id === e.pointerId) {
    const moved = Math.hypot(e.clientX - pendingTouch.x, e.clientY - pendingTouch.y);
    if (moved > MOVE_CANCEL_PX) {
      clearTimeout(armTimer);
      armTimer = null;
      pendingTouch = null;
    }
    return;
  }

  if (!dragState || dragState.id !== e.pointerId) return;
  const rect = canvasShell.getBoundingClientRect();
  const dx = (e.clientX - dragState.startX) / rect.width;
  const dy = (e.clientY - dragState.startY) / rect.height;
  bgPosition.x = clamp01(dragState.startPos.x - dx);
  bgPosition.y = clamp01(dragState.startPos.y - dy);
  draw();
});

function endDrag(e) {
  clearTimeout(armTimer);
  armTimer = null;
  pendingTouch = null;
  if (dragState && dragState.id === e.pointerId) dragState = null;
  canvasShell.classList.remove('dragging');
}
canvasShell.addEventListener('pointerup', endDrag);
canvasShell.addEventListener('pointercancel', endDrag);
canvasShell.addEventListener('pointerleave', endDrag);

canvasShell.addEventListener('wheel', e => {
  if (!bgImage) return;
  e.preventDefault();
  bgZoom = Math.max(1, Math.min(3, bgZoom - e.deltaY * 0.0015));
  draw();
}, { passive: false });

// simple pinch-to-zoom using two touch pointers
const activeTouches = new Map();
canvasShell.addEventListener('pointerdown', e => {
  if (e.pointerType !== 'touch') return;
  activeTouches.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (activeTouches.size === 2) {
    clearTimeout(armTimer);
    armTimer = null;
    pendingTouch = null;
    dragState = null;
    canvasShell.classList.add('dragging');
    const pts = [...activeTouches.values()];
    const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
    pinchState = { startDist: dist, startZoom: bgZoom };
  }
});
canvasShell.addEventListener('pointermove', e => {
  if (e.pointerType !== 'touch' || !activeTouches.has(e.pointerId)) return;
  activeTouches.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pinchState && activeTouches.size === 2 && bgImage) {
    const pts = [...activeTouches.values()];
    const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
    const ratio = dist / pinchState.startDist;
    bgZoom = Math.max(1, Math.min(3, pinchState.startZoom * ratio));
    draw();
  }
});
function releaseTouch(e) {
  if (e.pointerType !== 'touch') return;
  activeTouches.delete(e.pointerId);
  if (activeTouches.size < 2) {
    pinchState = null;
    canvasShell.classList.remove('dragging');
  }
}
canvasShell.addEventListener('pointerup', releaseTouch);
canvasShell.addEventListener('pointercancel', releaseTouch);

document.getElementById('reset-pos-btn').addEventListener('click', () => {
  bgPosition = { x: 0.5, y: 0.5 };
  bgZoom = 1;
  draw();
  showToast('Posição e zoom redefinidos');
});

/* ---------- upload ---------- */
function loadImageFromFile(file, callback) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => callback(img);
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
document.getElementById('bg-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('bg-filename').textContent = file.name;
  document.getElementById('bg-label').textContent = 'Trocar Foto';
  bgPosition = { x: 0.5, y: 0.5 };
  bgZoom = 1;
  loadImageFromFile(file, img => { bgImage = img; draw(); });
});

/* ---------- icons for footer ---------- */
function drawRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function drawInstagramIcon(x, y, size) {
  drawRoundRect(x, y, size, size, size * 0.3);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(x + size / 2, y + size / 2, size * 0.26, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(x + size * 0.78, y + size * 0.22, size * 0.06, 0, Math.PI * 2);
  ctx.fillStyle = ctx.strokeStyle;
  ctx.fill();
}
function drawFacebookIcon(x, y, size) {
  const cx = x + size / 2, cy = y + size / 2, r = size / 2;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.stroke();
  const fx = cx - size * 0.06;
  ctx.beginPath();
  ctx.moveTo(fx, cy + size * 0.28);
  ctx.lineTo(fx, cy - size * 0.12);
  ctx.quadraticCurveTo(fx, cy - size * 0.32, fx + size * 0.22, cy - size * 0.32);
  ctx.moveTo(fx - size * 0.12, cy - size * 0.02);
  ctx.lineTo(fx + size * 0.16, cy - size * 0.02);
  ctx.stroke();
}
function drawFooterSocial() {
  const label = '@topfm.itaiopolis';
  const iconSize = 22;
  const iconGap = 10;
  const groupGap = 12;
  ctx.save();
  ctx.globalAlpha = 0.32;
  ctx.strokeStyle = '#ffffff';
  ctx.fillStyle = '#ffffff';
  ctx.lineWidth = 1.6;
  ctx.font = '500 22px Inter, sans-serif';
  ctx.textBaseline = 'middle';
  const textWidth = ctx.measureText(label).width;
  const totalWidth = iconSize + iconGap + iconSize + groupGap + textWidth;
  let x = (W - totalWidth) / 2;
  const centerY = H - 40;
  drawInstagramIcon(x, centerY - iconSize / 2, iconSize);
  x += iconSize + iconGap;
  drawFacebookIcon(x, centerY - iconSize / 2, iconSize);
  x += iconSize + groupGap;
  ctx.fillText(label, x, centerY + 1);
  ctx.restore();
}

/* ---------- main draw ---------- */
function draw(opts) {
  const transparentExport = !!(opts && opts.transparentExport);
  ctx.clearRect(0, 0, W, H);

  if (bgImage) {
    drawImageCover(bgImage, 0, 0, W, H, bgPosition.x, bgPosition.y, bgZoom);
  } else if (transparentExport) {
    // leave transparent for the reels/stories PNG export with no photo
  } else {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#2b3542');
    g.addColorStop(1, '#0d1117');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(255,255,255,.35)';
    ctx.font = '500 28px Inter';
    ctx.textAlign = 'center';
    ctx.fillText('Envie uma imagem de fundo', W / 2, H / 2);
    ctx.textAlign = 'left';
  }

  if (!transparentExport) {
    ctx.fillStyle = `rgba(10,14,20,${0.18})`;
    ctx.fillRect(0, 0, W, H);

    const topShadowH = 140;
    const topGrad = ctx.createLinearGradient(0, 0, 0, topShadowH);
    topGrad.addColorStop(0, 'rgba(6,10,16,0.55)');
    topGrad.addColorStop(1, 'rgba(6,10,16,0)');
    ctx.fillStyle = topGrad;
    ctx.fillRect(0, 0, W, topShadowH);
  }

  const grad = ctx.createLinearGradient(0, H * 0.45, 0, H);
  grad.addColorStop(0, `rgba(6,10,16,0)`);
  grad.addColorStop(0.55, `rgba(6,10,16,${overlayStrength * 0.85})`);
  grad.addColorStop(1, `rgba(4,7,12,${overlayStrength + 0.25})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  if (logoImage) {
    const maxLogoW = 170;
    const ratio = logoImage.width / logoImage.height;
    let lw = maxLogoW, lh = maxLogoW / ratio;
    if (lh > 110) { lh = 110; lw = lh * ratio; }
    const logoMargin = 60;
    let logoX;
    if (logoAlign === 'left') logoX = logoMargin;
    else if (logoAlign === 'right') logoX = W - lw - logoMargin;
    else logoX = (W - lw) / 2;
    ctx.drawImage(logoImage, logoX, 46, lw, lh);
  }

  const marginLeft = 92;
  const barX = marginLeft;
  const textX = marginLeft + 34;
  const maxTextWidth = W - textX - 70;

  ctx.letterSpacing = '-1px';
  const fit = fitHeadline(state.headline, maxTextWidth, 64, 34, !!selectedCategory.big);
  const lines = fit.lines;
  const lineHeight = fit.lineHeight;
  const subtitleFont = "400 30px Inter, sans-serif";

  const blockHeight = lines.length * lineHeight + 20 + 40;
  const bottomMargin = (H === 1920) ? 340 : 100;
  let startY = H - bottomMargin - blockHeight;
  if (startY < H * 0.55) startY = H * 0.55;

  const badgeHeight = 46;
  const badgePaddingX = 22;
  const badgeGap = 24;
  const badgeFont = "800 25px Inter, sans-serif";
  ctx.font = badgeFont;
  ctx.letterSpacing = '0.5px';
  const badgeText = selectedCategory.label.toUpperCase();
  const badgeTextWidth = ctx.measureText(badgeText).width;
  const badgeWidth = badgeTextWidth + badgePaddingX * 2;
  const badgeY = startY - badgeGap - badgeHeight;

  drawRoundRect(textX, badgeY, badgeWidth, badgeHeight, 8);
  ctx.fillStyle = selectedCategory.color;
  ctx.fill();
  if (selectedCategory.textColor === '#1A1A1A') {
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = 'rgba(0,0,0,0.18)';
    ctx.stroke();
  }

  ctx.fillStyle = selectedCategory.textColor || '#ffffff';
  ctx.textBaseline = 'middle';
  ctx.fillText(badgeText, textX + badgePaddingX, badgeY + badgeHeight / 2 + 2);
  ctx.textBaseline = 'alphabetic';
  ctx.letterSpacing = '0px';

  const hasSubtitle = state.subtitle && state.subtitle.trim().length > 0;
  const barTop = badgeY;
  const barBottom = hasSubtitle
    ? startY + lines.length * lineHeight + 44
    : startY + lines.length * lineHeight - 6;
  ctx.fillStyle = lineColor;
  ctx.fillRect(barX, barTop, selectedCategory.big ? 10 : 7, barBottom - barTop);

  ctx.fillStyle = '#ffffff';
  ctx.font = fit.font;
  ctx.textBaseline = 'alphabetic';
  ctx.shadowColor = 'rgba(0,0,0,.35)';
  ctx.shadowBlur = 14;
  lines.forEach((line, i) => {
    ctx.fillText(line, textX, startY + (i + 1) * lineHeight - 14);
  });
  ctx.shadowBlur = 0;
  ctx.letterSpacing = '0px';

  const subtitleY = startY + lines.length * lineHeight + 34;
  ctx.fillStyle = 'rgba(230,234,240,0.88)';
  ctx.font = subtitleFont;
  ctx.fillText(state.subtitle, textX, subtitleY);

  drawFooterSocial();
}

/* ---------- download ---------- */
function isIOS() {
  const ua = navigator.userAgent;
  const isAppleTouch = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  const isIpadOS13Plus = navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1;
  return isAppleTouch || isIpadOS13Plus;
}

function withFinalRender(fn) {
  const useTransparent = !bgImage && H === 1920;
  if (useTransparent) draw({ transparentExport: true });
  fn();
  if (useTransparent) draw();
}

function downloadImage() {
  withFinalRender(() => {
    canvas.toBlob(blob => {
      if (!blob) {
        showToast('Não foi possível gerar a imagem. Tente novamente.');
        return;
      }

      pushHistory(state.headline);

      const url = URL.createObjectURL(blob);

      if (isIOS()) {
        const win = window.open(url, '_blank');
        if (!win) window.location.href = url;
        setTimeout(() => URL.revokeObjectURL(url), 60000);
        showToast('A imagem abriu em uma nova aba. Toque e segure para salvar.', 3600);
      } else {
        const link = document.createElement('a');
        link.download = 'thumbnail-instagram.png';
        link.href = url;
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      }
    }, 'image/png');
  });
}

document.getElementById('download-btn').addEventListener('click', downloadImage);

/* ---------- preview modal ---------- */
const previewModal = document.getElementById('preview-modal');
const previewModalImg = document.getElementById('preview-modal-img');

document.getElementById('preview-btn').addEventListener('click', () => {
  withFinalRender(() => {
    previewModalImg.src = canvas.toDataURL('image/png');
  });
  previewModal.classList.add('open');
});

document.getElementById('preview-back-btn').addEventListener('click', () => {
  previewModal.classList.remove('open');
});

document.getElementById('preview-download-btn').addEventListener('click', downloadImage);

/* ---------- apply saved settings on load ---------- */
(function applySavedSettings() {
  const saved = loadSettings();
  if (!saved) { setSize(SIZE_PRESETS[0], true); return; }

  const preset = SIZE_PRESETS.find(p => p.key === saved.sizeKey) || SIZE_PRESETS[0];
  setSize(preset, true);

  if (typeof saved.overlay === 'number') {
    overlayStrength = saved.overlay;
    document.getElementById('overlay-range').value = Math.round(saved.overlay * 100);
  }
  if (saved.logoAlign) {
    logoAlign = saved.logoAlign;
    [...logoAlignWrap.children].forEach(b => b.classList.toggle('active', b.dataset.value === saved.logoAlign));
  }
  if (saved.categoryLabel) {
    const match = CATEGORIES.find(c => c.label === saved.categoryLabel);
    if (match) {
      const idx = CATEGORIES.indexOf(match);
      const btn = categoryWrap.children[idx];
      if (btn) selectCategory(match, btn);
    }
  }
})();

if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(draw);
} else {
  draw();
}
setTimeout(draw, 300);
</script>
